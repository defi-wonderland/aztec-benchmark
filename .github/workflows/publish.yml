name: Publish Aztec Benchmark Package

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.release.draft == false)
    environment: Publisher
    runs-on: ubuntu-latest

    steps:
      - name: Check out github repository
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm (for OIDC support)
        run: npm install -g npm@11.5.2

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Build
        run: yarn build

      - name: Update version (dev branch)
        if: github.ref == 'refs/heads/dev'
        run: yarn version --new-version "0.0.0-snapshot.${GITHUB_SHA::8}" --no-git-tag-version

      - name: Publish snapshot (dev branch)
        if: github.ref == 'refs/heads/dev'
        run: npm publish --access public --tag snapshot

      - name: Publish stable (main branch)
        if: github.ref == 'refs/heads/main'
        run: npm publish --access public
