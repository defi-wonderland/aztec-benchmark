# .github/workflows/canary.yml
name: Canary Release (OIDC)

on: workflow_dispatch

permissions:
  contents: read
  id-token: write

jobs:
  publish-canary:
    if: github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.release.draft == false)
    runs-on: ubuntu-latest
    environment: Publisher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
          cache: "yarn"
          registry-url: "https://registry.npmjs.org/"

      - name: Update npm (for OIDC support)
        run: npm install -g npm@11.5.2

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Update version
        run: yarn version --new-version "0.0.0-${GITHUB_SHA::8}" --no-git-tag-version

      - name: Build package
        run: yarn build

      - name: Get package version and name
        id: package-info
        run: |
          echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
          echo "name=$(jq -r .name package.json)" >> $GITHUB_OUTPUT

      - name: Publish Canary to npm
        run: npm publish --tag canary --access public

      - name: Output Canary Version Info
        run: echo "Published canary version ${{ steps.package-info.outputs.version }} of ${{ steps.package-info.outputs.name }} to npm." 