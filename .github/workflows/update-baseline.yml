name: Update Baseline Benchmarks

on:
  workflow_call:
    inputs:
      runner:
        description: "GitHub runner label"
        type: string
        default: "ubuntu-latest-m"
      timeout:
        description: "Job timeout in minutes"
        type: number
        default: 120
      bench-dir:
        description: "Directory for benchmark files"
        type: string
        default: "./benchmarks"
      current-suffix:
        description: "Suffix for benchmark report files"
        type: string
        default: "_latest"

permissions:
  contents: read
  actions: write

env:
  BENCH_DIR: ${{ inputs.bench-dir }}
  BENCH_SUFFIX: ${{ inputs.current-suffix }}

jobs:
  update-baseline:
    name: Update Baseline
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Aztec environment
        uses: defi-wonderland/aztec-ci-actions/actions/setup-aztec@v0
        with:
          start-pxe: "true"
          run-codegen: "true"

      - name: Run benchmarks
        run: yarn aztec-benchmark --suffix "$BENCH_SUFFIX" --output-dir "$BENCH_DIR"

      - name: List baseline files
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          echo "Baseline files for branch: ${BRANCH_NAME}"
          ls -lh "$BENCH_DIR"/*"$BENCH_SUFFIX".benchmark.json

      - name: Encode branch name
        id: encode
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          encoded=$(echo "${BRANCH_NAME}" | sed 's/\//-/g')
          echo "branch-encoded=${encoded}" >> $GITHUB_OUTPUT

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline-${{ steps.encode.outputs.branch-encoded }}
          path: ${{ env.BENCH_DIR }}/*${{ env.BENCH_SUFFIX }}.benchmark.json
          retention-days: 90
          if-no-files-found: error
