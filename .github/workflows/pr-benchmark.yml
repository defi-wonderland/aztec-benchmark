name: PR Benchmark

on:
  workflow_call:
    inputs:
      runner:
        description: "GitHub runner label"
        type: string
        default: "ubuntu-latest-m"
      timeout:
        description: "Job timeout in minutes"
        type: number
        default: 120
      bench-dir:
        description: "Directory for benchmark files"
        type: string
        default: "./benchmarks"

permissions:
  pull-requests: write
  issues: write
  actions: read

env:
  BENCH_DIR: ${{ inputs.bench-dir }}

jobs:
  benchmark:
    name: Benchmark
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Aztec environment
        uses: defi-wonderland/aztec-ci-actions/actions/setup-aztec@v0
        with:
          start-pxe: "true"
          run-codegen: "true"

      - name: Run benchmarks
        run: yarn aztec-benchmark --suffix _new --output-dir ${{ env.BENCH_DIR }}

      - name: Encode base branch name
        id: encode-base
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          encoded=$(echo "${BASE_REF}" | sed 's/\//-/g')
          echo "base-ref-encoded=${encoded}" >> $GITHUB_OUTPUT
          if [[ "${BASE_REF}" == "dev" || "${BASE_REF}" == "main" ]]; then
            echo "workflow=update-baseline.yml" >> $GITHUB_OUTPUT
          else
            echo "workflow=pr-checks.yml" >> $GITHUB_OUTPUT
          fi

      - name: Download baseline artifact
        id: download-baseline
        continue-on-error: true
        uses: dawidd6/action-download-artifact@0bd50d53a6d7fb5cb921e607957e9cc12b4ce392 # v12
        with:
          workflow: ${{ steps.encode-base.outputs.workflow }}
          branch: ${{ github.event.pull_request.base.ref }}
          name: benchmark-baseline-${{ steps.encode-base.outputs.base-ref-encoded }}
          path: ${{ env.BENCH_DIR }}
          if_no_artifact_found: warn

      - name: Generate comparison report
        run: |
          node -e "
            const { runComparison } = require(
              require.resolve('@defi-wonderland/aztec-benchmark/action/comparison.cjs')
            );
            const fs = require('fs');
            const result = runComparison({
              reportsDir: '${{ env.BENCH_DIR }}',
              baseSuffix: '_latest',
              prSuffix: '_new',
              threshold: 2.5
            });
            fs.writeFileSync('benchmark-comparison.md', result);
          "

      - name: Comment diff on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: benchmark-comparison.md

      - name: Rename to baseline format
        run: |
          rm -f ${{ env.BENCH_DIR }}/*_latest.benchmark.json
          for file in ${{ env.BENCH_DIR }}/*_new.benchmark.json; do
            [ -f "$file" ] && mv "$file" "${file/_new.benchmark.json/_latest.benchmark.json}"
          done

      - name: Encode head branch name
        id: encode-head
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          encoded=$(echo "${HEAD_REF}" | sed 's/\//-/g')
          echo "head-ref-encoded=${encoded}" >> $GITHUB_OUTPUT

      - name: Upload baseline
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline-${{ steps.encode-head.outputs.head-ref-encoded }}
          path: ${{ env.BENCH_DIR }}/*_latest.benchmark.json
          retention-days: 90
          if-no-files-found: error
